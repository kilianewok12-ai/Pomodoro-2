<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --c: #c9956a;
      --c-rgb: 201,149,106;
      --bg: #0d0b09;
      --bg2: #111009;
      --surface: rgba(255,255,255,0.03);
      --surface-border: rgba(255,255,255,0.07);
      --text: #f2ede6;
      --text2: rgba(242,237,230,0.55);
      --muted: #5a5248;
      --divider: rgba(255,255,255,0.05);
      --btn-radius: 100px;
    }

    html.light {
      --bg: #f5f0e8;
      --bg2: #ede8df;
      --surface: rgba(0,0,0,0.04);
      --surface-border: rgba(0,0,0,0.08);
      --text: #1a1612;
      --text2: rgba(26,22,18,0.5);
      --muted: #9a9088;
      --divider: rgba(0,0,0,0.06);
    }

    html { transition: background 0.5s ease; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Tenor Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* Ambient glow */
    #ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(var(--c-rgb),0.09) 0%, transparent 70%),
        radial-gradient(ellipse 50% 70% at 90% 110%, rgba(var(--c-rgb),0.05) 0%, transparent 60%);
      transition: background 0.8s ease;
    }
    html.light #ambient {
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(var(--c-rgb),0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 70% at 90% 110%, rgba(var(--c-rgb),0.06) 0%, transparent 60%);
    }

    /* Noise */
    #noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Slider wrapper ── */
    #slider-track {
      display: flex;
      width: 200vw;
      min-height: 100vh;
      transition: transform 0.7s cubic-bezier(0.77,0,0.175,1);
      position: relative; z-index: 1;
    }
    #slider-track.show-bonsai { transform: translateX(-100vw); }

    .slide {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      flex-shrink: 0;
    }

    /* ── Theme toggle ── */
    #theme-btn {
      position: fixed; top: 1.4rem; right: 1.4rem; z-index: 100;
      background: var(--surface); border: 1px solid var(--surface-border);
      color: var(--text2); width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    #theme-btn:hover { color: var(--text); border-color: rgba(var(--c-rgb),0.3); transform: scale(1.1); }

    /* ── Swipe hint ── */
    #swipe-hint {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
      font-size: 0.55rem; letter-spacing: 0.2em; color: var(--muted);
      text-transform: uppercase; opacity: 0.7;
      display: flex; align-items: center; gap: 0.4rem;
      animation: hintFloat 3s ease-in-out infinite;
    }
    @keyframes hintFloat { 0%,100%{transform:translateX(0);} 50%{transform:translateX(4px);} }
    #swipe-hint::after { content:'→'; font-size: 0.8rem; }

    /* ── Timer app ── */
    .app { width: 100%; max-width: 420px; }
    .app > * { animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) both; }
    .app > *:nth-child(1) { animation-delay: 0s; }
    .app > *:nth-child(2) { animation-delay: 0.07s; }
    .app > *:nth-child(3) { animation-delay: 0.14s; }
    .app > *:nth-child(4) { animation-delay: 0.21s; }
    .app > *:nth-child(5) { animation-delay: 0.28s; }
    .app > *:nth-child(6) { animation-delay: 0.35s; }
    .app > *:nth-child(7) { animation-delay: 0.4s; }
    .app > *:nth-child(8) { animation-delay: 0.45s; }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .header { text-align:center; margin-bottom:2.8rem; }
    .eyebrow {
      font-size:0.58rem; letter-spacing:0.38em; color:var(--muted);
      text-transform:uppercase; margin-bottom:0.5rem;
      display:flex; align-items:center; justify-content:center; gap:0.8rem;
      transition: color 0.4s;
    }
    .eyebrow::before,.eyebrow::after {
      content:''; width:22px; height:1px;
      background:linear-gradient(90deg,transparent,var(--muted));
      transition: background 0.4s;
    }
    .eyebrow::after { transform:scaleX(-1); }
    #mode-title {
      font-family:'Cormorant Garamond',serif;
      font-size:3rem; font-weight:300; letter-spacing:0.08em;
      color:var(--c); line-height:1;
      transition: color 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.3s;
    }

    /* Mode pills */
    .modes {
      display:flex; gap:0.3rem; justify-content:center;
      margin-bottom:2.8rem;
      background:var(--surface); border:1px solid var(--surface-border);
      border-radius:100px; padding:0.28rem;
      backdrop-filter:blur(12px);
      transition: background 0.4s, border-color 0.4s;
    }
    .mode-btn {
      background:transparent; border:none; color:var(--muted);
      padding:0.42rem 1.05rem; cursor:pointer;
      font-family:'Tenor Sans',sans-serif;
      font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase;
      border-radius:100px;
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .mode-btn:hover { color:var(--text); }
    .mode-btn.active {
      background:rgba(var(--c-rgb),0.13); color:var(--c);
      box-shadow:inset 0 0 0 1px rgba(var(--c-rgb),0.28);
    }

    /* Ring */
    .ring-wrap { display:flex; justify-content:center; margin-bottom:2.8rem; }
    .ring-container { position:relative; width:280px; height:280px; }
    #ring-svg { transform:rotate(-90deg); will-change:transform; }
    #ring-track { fill:none; stroke:rgba(var(--c-rgb),0.06); stroke-width:1; }
    #ring-dashes {
      fill:none; stroke:rgba(var(--c-rgb),0.1); stroke-width:0.8; stroke-dasharray:2 20;
      animation:rotateDashes 40s linear infinite;
      transform-origin:140px 140px;
    }
    @keyframes rotateDashes { to { transform:rotate(360deg); } }
    #ring-glow {
      fill:none; stroke:var(--c); stroke-width:12; stroke-linecap:round;
      filter:blur(10px); opacity:0.22;
      transition: stroke-dashoffset 1.1s cubic-bezier(0.25,0.46,0.45,0.94), stroke 0.6s, opacity 0.5s;
    }
    #ring-progress {
      fill:none; stroke:var(--c); stroke-width:1.5; stroke-linecap:round;
      transition: stroke-dashoffset 1.1s cubic-bezier(0.25,0.46,0.45,0.94), stroke 0.6s;
    }
    .ring-container.running #ring-glow { animation:pulseGlow 3s ease-in-out infinite; }
    @keyframes pulseGlow { 0%,100%{opacity:0.15;} 50%{opacity:0.38;} }

    .ring-inner {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    #time-display {
      font-family:'Cormorant Garamond',serif;
      font-size:5.8rem; font-weight:300; letter-spacing:-0.01em;
      color:var(--text); line-height:1;
      text-shadow:0 0 80px rgba(var(--c-rgb),0.15);
      transition: color 0.5s ease, text-shadow 0.5s ease;
    }
    #session-count { font-size:0.56rem; letter-spacing:0.24em; color:var(--muted); text-transform:uppercase; margin-top:0.3rem; transition:color 0.4s; }

    /* Controls */
    .controls { display:flex; gap:0.9rem; justify-content:center; margin-bottom:3.2rem; }

    .reset-btn {
      background:var(--surface); border:1px solid var(--surface-border); color:var(--muted);
      padding:0.78rem 1.5rem;
      font-family:'Tenor Sans',sans-serif; font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
      cursor:pointer; border-radius:var(--btn-radius); backdrop-filter:blur(12px);
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1), border-radius 0s;
    }
    .reset-btn:hover { border-color:rgba(var(--c-rgb),0.2); color:var(--text); transform:translateY(-1px); }
    .reset-btn:active { transform:scale(0.97); }

    .start-btn {
      background:linear-gradient(145deg, rgba(var(--c-rgb),0.9), rgba(var(--c-rgb),0.62));
      border:1px solid rgba(var(--c-rgb),0.45); color:#0d0b09;
      padding:0.78rem 3rem;
      font-family:'Tenor Sans',sans-serif; font-size:0.6rem; letter-spacing:0.26em; text-transform:uppercase;
      cursor:pointer; border-radius:var(--btn-radius);
      box-shadow: 0 4px 30px rgba(var(--c-rgb),0.2), inset 0 1px 0 rgba(255,255,255,0.14);
      transition: all 0.45s cubic-bezier(0.16,1,0.3,1);
      position:relative; overflow:hidden;
    }
    .start-btn::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(145deg,rgba(255,255,255,0.13),transparent);
      transition: opacity 0.3s;
    }
    .start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 40px rgba(var(--c-rgb),0.32), inset 0 1px 0 rgba(255,255,255,0.16); }
    .start-btn:active { transform:scale(0.97); }

    /* Divider */
    .divider { display:flex; align-items:center; gap:1rem; margin-bottom:1.4rem; }
    .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--divider),transparent); transition:background 0.4s; }
    .divider-label { font-size:0.52rem; letter-spacing:0.32em; color:var(--muted); text-transform:uppercase; }

    /* Task input */
    .task-input-row { display:flex; gap:0.55rem; margin-bottom:0.9rem; }
    .task-input {
      flex:1; background:var(--surface); border:1px solid var(--surface-border);
      border-radius:100px; color:var(--text); padding:0.62rem 1.15rem;
      font-family:'Tenor Sans',sans-serif; font-size:0.73rem; letter-spacing:0.04em;
      outline:none; backdrop-filter:blur(12px);
      transition: border-color 0.3s, box-shadow 0.3s, background 0.4s;
    }
    .task-input:focus { border-color:rgba(var(--c-rgb),0.4); box-shadow:0 0 0 3px rgba(var(--c-rgb),0.07); }
    .task-input::placeholder { color:var(--muted); }
    .add-btn {
      background:rgba(var(--c-rgb),0.13); border:1px solid rgba(var(--c-rgb),0.22);
      color:var(--c); width:37px; height:37px; border-radius:50%; cursor:pointer;
      font-size:1.25rem; display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .add-btn:hover { background:rgba(var(--c-rgb),0.23); transform:scale(1.1) rotate(90deg); }
    .add-btn:active { transform:scale(0.94) rotate(90deg); }

    #task-list { list-style:none; }
    .empty-tasks {
      text-align:center; color:var(--muted); font-size:0.7rem;
      letter-spacing:0.12em; padding:1.8rem 0;
      font-style:italic; font-family:'Cormorant Garamond',serif;
    }
    .task-item {
      display:flex; align-items:center; gap:0.7rem;
      padding:0.7rem 0.2rem;
      border-bottom:1px solid var(--divider);
      animation: taskIn 0.38s cubic-bezier(0.16,1,0.3,1) both;
      transition: opacity 0.25s, transform 0.25s;
    }
    @keyframes taskIn { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
    .task-item:hover .del-btn { opacity:1; }

    .task-check {
      width:17px; height:17px; border:1px solid var(--muted);
      border-radius:50%; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      position:relative;
    }
    .task-check::after {
      content:''; width:7px; height:7px; border-radius:50%;
      background:var(--c); opacity:0; transform:scale(0);
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .task-check.checked { border-color:var(--c); box-shadow:0 0 10px rgba(var(--c-rgb),0.3); }
    .task-check.checked::after { opacity:1; transform:scale(1); }
    .task-text { font-size:0.76rem; color:var(--text2); flex:1; letter-spacing:0.04em; transition:all 0.3s; }
    .task-text.done { text-decoration:line-through; color:var(--muted); }
    .del-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; opacity:0; transition:all 0.2s; padding:0 0.2rem; line-height:1; }
    .del-btn:hover { color:var(--text); }

    #session-dots { display:flex; gap:0.45rem; justify-content:center; margin-top:2.2rem; min-height:8px; }
    .session-dot {
      width:5px; height:5px; border-radius:50%; background:rgba(var(--c-rgb),0.5);
      animation: dotPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes dotPop { from{opacity:0;transform:scale(0);} to{opacity:1;transform:scale(1);} }

    /* ────────────────────────────────────
       BONSAI SLIDE
    ──────────────────────────────────── */
    .bonsai-slide {
      flex-direction:column;
      gap:0;
    }
    .bonsai-back-btn {
      position:fixed; top:1.4rem; left:1.4rem; z-index:100;
      background:var(--surface); border:1px solid var(--surface-border);
      color:var(--text2); padding:0.4rem 0.9rem;
      border-radius:100px; cursor:pointer;
      font-family:'Tenor Sans',sans-serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase;
      backdrop-filter:blur(12px);
      transition: all 0.3s;
      opacity:0; pointer-events:none;
    }
    .bonsai-back-btn:hover { color:var(--text); border-color:rgba(var(--c-rgb),0.3); }
    #slider-track.show-bonsai .bonsai-back-btn { opacity:1; pointer-events:auto; }

    .bonsai-container { width:100%; max-width:440px; text-align:center; }
    .bonsai-header { margin-bottom:1.5rem; }
    .bonsai-title {
      font-family:'Cormorant Garamond',serif;
      font-size:2.2rem; font-weight:300; letter-spacing:0.1em; color:var(--c);
    }
    .bonsai-subtitle { font-size:0.58rem; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; margin-top:0.3rem; }

    #bonsai-canvas {
      width:100%; max-width:380px; height:340px;
      margin:0 auto; display:block;
    }

    .bonsai-stats {
      display:flex; gap:2rem; justify-content:center; margin-top:1.5rem;
    }
    .bonsai-stat { text-align:center; }
    .bonsai-stat-val {
      font-family:'Cormorant Garamond',serif;
      font-size:2rem; font-weight:300; color:var(--c);
    }
    .bonsai-stat-label { font-size:0.55rem; letter-spacing:0.22em; color:var(--muted); text-transform:uppercase; margin-top:0.1rem; }

    .bonsai-stage {
      font-size:0.62rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase;
      margin-top:1.2rem; display:flex; align-items:center; justify-content:center; gap:0.5rem;
    }
    .stage-dot { width:5px; height:5px; border-radius:50%; background:var(--c); display:inline-block; }
  </style>
</head>
<body>
<div id="ambient"></div>
<div id="noise"></div>

<button id="theme-btn" title="Theme wechseln">☀</button>
<div id="swipe-hint">Bonsai</div>
<button class="bonsai-back-btn" id="back-btn">← Zurück</button>

<div id="slider-track">

  <!-- SLIDE 1: Timer -->
  <div class="slide">
    <div class="app">
      <div class="header">
        <div class="eyebrow">Pomodoro</div>
        <div id="mode-title">Fokus</div>
      </div>

      <div class="modes">
        <button class="mode-btn active" data-mode="focus">Fokus</button>
        <button class="mode-btn" data-mode="short">Kurze Pause</button>
        <button class="mode-btn" data-mode="long">Lange Pause</button>
      </div>

      <div class="ring-wrap">
        <div class="ring-container" id="ring-container">
          <svg id="ring-svg" width="280" height="280">
            <circle id="ring-dashes"   cx="140" cy="140" r="120"/>
            <circle id="ring-track"    cx="140" cy="140" r="120"/>
            <circle id="ring-glow"     cx="140" cy="140" r="120"/>
            <circle id="ring-progress" cx="140" cy="140" r="120"/>
          </svg>
          <div class="ring-inner">
            <div id="time-display">25:00</div>
            <div id="session-count">0 sessions</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="reset-btn" id="reset-btn">Reset</button>
        <button class="start-btn" id="start-btn">Start</button>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-label">Aufgaben</span>
        <div class="divider-line"></div>
      </div>

      <div class="task-input-row">
        <input class="task-input" id="task-input" type="text" placeholder="Neue Aufgabe…"/>
        <button class="add-btn" id="add-btn">+</button>
      </div>

      <ul id="task-list"><li class="empty-tasks">— noch keine Aufgaben —</li></ul>
      <div id="session-dots"></div>
    </div>
  </div>

  <!-- SLIDE 2: Bonsai -->
  <div class="slide bonsai-slide">
    <div class="bonsai-container">
      <div class="bonsai-header">
        <div class="bonsai-title">Dein Bonsai</div>
        <div class="bonsai-subtitle">Wächst mit deiner Fokuszeit</div>
      </div>
      <canvas id="bonsai-canvas"></canvas>
      <div class="bonsai-stats">
        <div class="bonsai-stat">
          <div class="bonsai-stat-val" id="stat-sessions">0</div>
          <div class="bonsai-stat-label">Sessions</div>
        </div>
        <div class="bonsai-stat">
          <div class="bonsai-stat-val" id="stat-minutes">0</div>
          <div class="bonsai-stat-label">Minuten</div>
        </div>
      </div>
      <div class="bonsai-stage">
        <span class="stage-dot"></span>
        <span id="stage-label">Samenkorn</span>
        <span class="stage-dot"></span>
      </div>
    </div>
  </div>

</div>

<script>
// ─── Constants ───────────────────────────────────────────
const MODES = {
  focus: { label:"Fokus",       duration:25*60, color:"#c9956a", rgb:"201,149,106" },
  short: { label:"Kurze Pause", duration: 5*60, color:"#6aada6", rgb:"106,173,166" },
  long:  { label:"Lange Pause", duration:15*60, color:"#7a86c9", rgb:"122,134,201" },
};
const C = 2*Math.PI*120;
const STAGES = [
  { name:"Samenkorn",   sessions:0  },
  { name:"Keimling",    sessions:1  },
  { name:"Jungbaum",    sessions:3  },
  { name:"Heranwachsend", sessions:6 },
  { name:"Reifer Bonsai", sessions:10 },
  { name:"Meister-Bonsai",sessions:20 },
];

// ─── State ───────────────────────────────────────────────
let mode="focus", timeLeft=25*60, running=false, sessions=0, totalMinutes=0, interval=null, tasks=[];
let isLight = false;
let currentSlide = 0;
let touchStartX = 0;

// ─── DOM refs ─────────────────────────────────────────────
const $=id=>document.getElementById(id);
const ringProgress=$("ring-progress"), ringGlow=$("ring-glow");
const timeDisplay=$("time-display"), sessionCount=$("session-count");
const modeTitle=$("mode-title"), startBtn=$("start-btn"), resetBtn=$("reset-btn");
const taskInput=$("task-input"), addBtn=$("add-btn"), taskList=$("task-list");
const sessionDots=$("session-dots"), ringContainer=$("ring-container");
const sliderTrack=$("slider-track"), themeBtn=$("theme-btn"), backBtn=$("back-btn");
const bonsaiCanvas=$("bonsai-canvas");
const ctx=bonsaiCanvas.getContext("2d");

// ─── Init ring ───────────────────────────────────────────
[ringProgress,ringGlow].forEach(el=>{
  el.setAttribute("stroke-dasharray",C);
  el.setAttribute("stroke-dashoffset",0);
});

function pad(n){return String(n).padStart(2,"0");}
function setColor(c,rgb){
  document.documentElement.style.setProperty("--c",c);
  document.documentElement.style.setProperty("--c-rgb",rgb);
}

// ─── Ring update ─────────────────────────────────────────
function updateRing(){
  const offset = C*(timeLeft/MODES[mode].duration);
  ringProgress.style.strokeDashoffset = offset;
  ringGlow.style.strokeDashoffset = offset;
  timeDisplay.textContent = `${pad(Math.floor(timeLeft/60))}:${pad(timeLeft%60)}`;
}

// ─── Mode switch ─────────────────────────────────────────
function switchMode(m){
  mode=m; timeLeft=MODES[m].duration; running=false;
  clearInterval(interval); startBtn.textContent="Start";
  ringContainer.classList.remove("running");
  // restore pill shape
  document.documentElement.style.setProperty("--btn-radius","100px");
  startBtn.style.borderRadius="";
  startBtn.style.background="";
  startBtn.style.boxShadow="";
  startBtn.style.color="";
  startBtn.style.borderColor="";
  modeTitle.textContent=MODES[m].label;
  setColor(MODES[m].color,MODES[m].rgb);
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",b.dataset.mode===m));
  updateRing();
}

// ─── Tick ────────────────────────────────────────────────
function tick(){
  if(timeLeft<=0){
    clearInterval(interval); running=false;
    startBtn.textContent="Start";
    ringContainer.classList.remove("running");
    // restore button
    startBtn.style.borderRadius="";
    startBtn.style.background="";
    startBtn.style.boxShadow="";
    startBtn.style.color="";
    startBtn.style.borderColor="";
    if(mode==="focus"){
      sessions++;
      totalMinutes+=25;
      sessionCount.textContent=`${sessions} session${sessions!==1?"s":""}`;
      updateSessionDots();
      updateBonsai();
    }
    timeDisplay.style.color=MODES[mode].color;
    setTimeout(()=>{ timeDisplay.style.color=""; },800);
    return;
  }
  timeLeft--;
  if(mode==="focus") totalMinutes+=1/60;
  updateRing();
}

// ─── Start button (with square-ish state) ────────────────
startBtn.addEventListener("click",()=>{
  running=!running;
  if(running){
    interval=setInterval(tick,1000);
    startBtn.textContent="Pause";
    ringContainer.classList.add("running");
    // pill stays pill — square corners on active/running state via JS
    startBtn.style.borderRadius="14px";
    startBtn.style.background="linear-gradient(145deg,rgba(var(--c-rgb),0.95),rgba(var(--c-rgb),0.7))";
  } else {
    clearInterval(interval);
    startBtn.textContent="Start";
    ringContainer.classList.remove("running");
    startBtn.style.borderRadius="";
    startBtn.style.background="";
    startBtn.style.boxShadow="";
    startBtn.style.color="";
    startBtn.style.borderColor="";
  }
});

resetBtn.addEventListener("click",()=>{
  clearInterval(interval); running=false; startBtn.textContent="Start";
  ringContainer.classList.remove("running");
  startBtn.style.borderRadius="";
  startBtn.style.background="";
  startBtn.style.boxShadow="";
  startBtn.style.color="";
  startBtn.style.borderColor="";
  timeLeft=MODES[mode].duration; updateRing();
});

document.querySelectorAll(".mode-btn").forEach(btn=>btn.addEventListener("click",()=>switchMode(btn.dataset.mode)));

// ─── Tasks ───────────────────────────────────────────────
function renderTasks(){
  taskList.innerHTML="";
  if(!tasks.length){ taskList.innerHTML='<li class="empty-tasks">— noch keine Aufgaben —</li>'; return; }
  tasks.forEach((task,i)=>{
    const li=document.createElement("li"); li.className="task-item";
    const check=document.createElement("div");
    check.className="task-check"+(task.done?" checked":"");
    check.addEventListener("click",()=>{ tasks[i].done=!tasks[i].done; renderTasks(); });
    const text=document.createElement("span");
    text.className="task-text"+(task.done?" done":""); text.textContent=task.text;
    const del=document.createElement("button"); del.className="del-btn"; del.textContent="×";
    del.addEventListener("click",()=>{
      li.style.opacity="0"; li.style.transform="translateX(10px)";
      setTimeout(()=>{ tasks.splice(i,1); renderTasks(); },230);
    });
    li.appendChild(check); li.appendChild(text); li.appendChild(del); taskList.appendChild(li);
  });
}
function addTask(){
  const val=taskInput.value.trim(); if(!val)return;
  tasks.push({text:val,done:false}); taskInput.value=""; renderTasks();
}
addBtn.addEventListener("click",addTask);
taskInput.addEventListener("keydown",e=>{ if(e.key==="Enter")addTask(); });

// ─── Session dots ────────────────────────────────────────
function updateSessionDots(){
  sessionDots.innerHTML="";
  for(let i=0;i<Math.min(sessions,8);i++){
    const d=document.createElement("div"); d.className="session-dot";
    d.style.animationDelay=`${i*0.07}s`; sessionDots.appendChild(d);
  }
}

// ─── Theme toggle ────────────────────────────────────────
themeBtn.addEventListener("click",()=>{
  isLight=!isLight;
  document.documentElement.classList.toggle("light",isLight);
  themeBtn.textContent = isLight ? "☾" : "☀";
  drawBonsai();
});

// ─── Slide / Swipe ───────────────────────────────────────
function goToSlide(n){
  currentSlide=n;
  sliderTrack.classList.toggle("show-bonsai",n===1);
  if(n===1) drawBonsai();
}
backBtn.addEventListener("click",()=>goToSlide(0));

document.addEventListener("touchstart",e=>{ touchStartX=e.touches[0].clientX; },{passive:true});
document.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx)>60){
    if(dx<0 && currentSlide===0) goToSlide(1);
    if(dx>0 && currentSlide===1) goToSlide(0);
  }
},{passive:true});

// Also allow click on hint
document.getElementById("swipe-hint").addEventListener("click",()=>goToSlide(currentSlide===0?1:0));

// ─── BONSAI DRAWING ──────────────────────────────────────
function resizeCanvas(){
  const w=Math.min(380, bonsaiCanvas.parentElement.offsetWidth-40);
  bonsaiCanvas.width=w*2; bonsaiCanvas.height=340*2;
  bonsaiCanvas.style.width=w+"px"; bonsaiCanvas.style.height="340px";
  ctx.scale(2,2);
}

function getStage(){
  for(let i=STAGES.length-1;i>=0;i--){
    if(sessions>=STAGES[i].sessions) return i;
  }
  return 0;
}

function drawBonsai(){
  resizeCanvas();
  const W=bonsaiCanvas.width/2, H=bonsaiCanvas.height/2;
  ctx.clearRect(0,0,W,H);

  const stage=getStage();
  const dark=!isLight;
  const accent=MODES[mode].color;

  // Update stats
  $("stat-sessions").textContent=sessions;
  $("stat-minutes").textContent=Math.floor(totalMinutes);
  $("stage-label").textContent=STAGES[stage].name;

  // Ground
  const grd=ctx.createLinearGradient(0,H-30,0,H);
  grd.addColorStop(0,dark?"rgba(100,80,50,0.15)":"rgba(100,80,50,0.1)");
  grd.addColorStop(1,"transparent");
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.ellipse(W/2,H-18,W*0.38,12,0,0,Math.PI*2);
  ctx.fill();

  // Pot
  if(stage>=1) drawPot(W/2, H-18, stage, dark, accent);

  // Tree
  if(stage===0){
    drawSeed(W/2, H-30, dark, accent);
  } else {
    ctx.save();
    ctx.translate(W/2, H-36);
    drawBranch(ctx, 0, 0, -Math.PI/2, Math.max(18,18+stage*12), stage, dark, accent, 0);
    ctx.restore();
  }

  // Floating particles if high stage
  if(stage>=4){
    drawParticles(W, H, accent, stage);
  }
}

function drawPot(x,y,stage,dark,accent){
  const pw=14+stage*3; const ph=10+stage*2;
  const g=ctx.createLinearGradient(x-pw,y,x+pw,y+ph);
  g.addColorStop(0,dark?"#3a2e22":"#c4a882");
  g.addColorStop(1,dark?"#2a1e14":"#a8855e");
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(x-pw,y); ctx.lineTo(x-pw+4,y+ph); ctx.lineTo(x+pw-4,y+ph); ctx.lineTo(x+pw,y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=dark?"#4a3a2a":"#d4b890";
  ctx.fillRect(x-pw-2,y-3,pw*2+4,5);
}

function drawBranch(ctx, x, y, angle, length, stage, dark, accent, depth){
  if(length<3) return;
  const maxDepth = Math.min(stage+1, 5);
  if(depth>maxDepth) return;

  const ex=x+Math.cos(angle)*length;
  const ey=y+Math.sin(angle)*length;

  const thick=Math.max(0.5,(maxDepth-depth+0.5)*1.2);
  ctx.strokeStyle=dark
    ? `rgba(100,70,40,${0.9-depth*0.08})`
    : `rgba(80,50,25,${0.85-depth*0.07})`;
  ctx.lineWidth=thick;
  ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(ex,ey); ctx.stroke();

  if(depth===maxDepth || (stage>=2 && depth>=maxDepth-1)){
    drawLeafCluster(ctx, ex, ey, length, stage, dark, accent, depth);
    return;
  }

  const spread = 0.28+depth*0.06;
  const shrink = 0.58+Math.random()*0.06;
  const bend   = (Math.random()-0.5)*0.18;
  drawBranch(ctx,ex,ey,angle-spread+bend,length*shrink,stage,dark,accent,depth+1);
  drawBranch(ctx,ex,ey,angle+spread+bend,length*shrink,stage,dark,accent,depth+1);
  if(stage>=3 && depth<maxDepth-1){
    drawBranch(ctx,ex,ey,angle+(Math.random()-0.5)*0.4,length*shrink*0.7,stage,dark,accent,depth+2);
  }
}

function drawLeafCluster(ctx, x, y, size, stage, dark, accent){
  const r=Math.max(6,4+stage*2.5);
  const count=3+stage;
  for(let i=0;i<count;i++){
    const ox=(Math.random()-0.5)*r*1.2;
    const oy=(Math.random()-0.5)*r*1.2;
    const lr=r*(0.45+Math.random()*0.55);
    const hues=[
      dark?"rgba(40,90,45,0.75)":"rgba(55,110,55,0.7)",
      dark?"rgba(55,105,40,0.7)":"rgba(75,130,50,0.65)",
      dark?"rgba(35,75,40,0.8)":"rgba(50,100,45,0.75)",
      dark?"rgba(65,110,50,0.65)":"rgba(85,140,60,0.6)",
    ];
    ctx.fillStyle=hues[i%hues.length];
    ctx.beginPath();
    ctx.ellipse(x+ox,y+oy,lr,lr*0.8,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  // accent blossom on high stage
  if(stage>=4 && Math.random()>0.65){
    ctx.fillStyle=accent+"aa";
    ctx.beginPath();
    ctx.arc(x+(Math.random()-0.5)*r, y+(Math.random()-0.5)*r, 2.2,0,Math.PI*2);
    ctx.fill();
  }
}

function drawSeed(x,y,dark,accent){
  ctx.fillStyle=dark?"#5a4030":"#8a6040";
  ctx.beginPath(); ctx.ellipse(x,y,5,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=accent+"99";
  ctx.beginPath(); ctx.arc(x,y-9,2.5,0,Math.PI*2); ctx.fill();
}

function drawParticles(W,H,accent,stage){
  const count=4+stage;
  for(let i=0;i<count;i++){
    const px=W*0.25+Math.random()*W*0.5;
    const py=H*0.15+Math.random()*H*0.55;
    ctx.fillStyle=accent+(Math.random()>0.5?"66":"44");
    ctx.beginPath(); ctx.arc(px,py,1.2+Math.random()*1.5,0,Math.PI*2); ctx.fill();
  }
}

// ─── Init ────────────────────────────────────────────────
setColor(MODES[mode].color,MODES[mode].rgb);
updateRing();
drawBonsai();
</script>
